# PROD — MySQL, minimal logging
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:betcore}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:betcore}
spring.datasource.password=${DB_PASSWORD:betcore}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.h2-console.enabled=false

logging.level.com.betcore=INFO
logging.level.org.springframework.web=WARN